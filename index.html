<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>拾句 — 稍後讀與書摘回顧</title>
<meta name="theme-color" content="#1B3247">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="拾句">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F5F4; --card:#FCFDFC;
  --ink:#17242F; --ink-soft:#4A5B68;
  --indigo:#2C4A63; --indigo-deep:#1B3247;
  --mist:#D4DDE0; --shu:#C4462B;
  --hl:#F6E3B4;
  --radius:14px;
  --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC',-apple-system,sans-serif;
  --font-scale:1;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--paper);color:var(--ink);
  font-size:16px;line-height:1.6;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
}
body.reading{padding-bottom:calc(64px + env(safe-area-inset-bottom))}
header{
  padding:calc(16px + env(safe-area-inset-top)) 20px 12px;
  display:flex;align-items:baseline;justify-content:space-between;
}
body.reading header, body.reading nav{display:none}
header h1{font-family:var(--serif);font-weight:700;font-size:26px;letter-spacing:.12em;color:var(--indigo-deep)}
header h1 span{font-size:12px;letter-spacing:.28em;color:var(--ink-soft);font-family:var(--sans);font-weight:500;margin-left:10px}
#userchip{font-size:12px;color:var(--ink-soft);cursor:pointer;background:none;border:none;font-family:var(--sans)}
main{padding:0 16px;max-width:640px;margin:0 auto}
.hidden{display:none!important}

/* ---- 登入畫面 ---- */
#view-login{text-align:center;padding-top:12vh}
#view-login .mark{
  width:88px;height:88px;margin:0 auto 22px;border-radius:20px;
  background:var(--indigo-deep);color:var(--paper);
  font-family:var(--serif);font-weight:700;font-size:44px;
  display:flex;align-items:center;justify-content:center;position:relative;
}
#view-login .mark::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:var(--indigo);border-radius:20px 0 0 20px}
#view-login h2{font-family:var(--serif);font-size:20px;color:var(--indigo-deep);margin-bottom:8px}
#view-login p{font-size:14px;color:var(--ink-soft);margin-bottom:28px}
#login-btn{
  font-family:var(--sans);font-size:15px;font-weight:500;
  padding:13px 28px;border-radius:12px;cursor:pointer;
  border:none;background:var(--indigo-deep);color:#fff;
}
#login-hint{font-size:12px;color:var(--ink-soft);margin-top:18px;line-height:1.8}

/* ---- Tab bar ---- */
nav{
  position:fixed;left:0;right:0;bottom:0;
  background:rgba(252,253,252,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--mist);
  display:flex;justify-content:space-around;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:50;
}
nav button{flex:1;background:none;border:none;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink-soft);padding:8px 0 6px;cursor:pointer;border-radius:10px}
nav button .ic{display:block;font-size:19px;line-height:1.2;font-family:var(--serif)}
nav button.on{color:var(--indigo-deep)}
nav button.on .ic{color:var(--shu)}
nav button:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}

/* ---- 通用 ---- */
.btn{
  flex:1;font-family:var(--sans);font-size:15px;font-weight:500;
  padding:12px 0;border-radius:12px;cursor:pointer;
  border:1px solid var(--mist);background:var(--card);color:var(--indigo-deep);
}
.btn.primary{background:var(--indigo-deep);border-color:var(--indigo-deep);color:#fff}
.btn.sm{font-size:13px;padding:9px 0;color:var(--ink-soft)}
.btn:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
.empty{text-align:center;padding:64px 24px;color:var(--ink-soft)}
.empty .glyph{font-family:var(--serif);font-size:40px;color:var(--mist);margin-bottom:12px}
.empty p{font-size:14px;line-height:1.8}
.tag{font-size:11px;letter-spacing:.05em;color:var(--indigo);border:1px solid var(--mist);border-radius:999px;padding:2px 10px}

/* ---- 收件匣 ---- */
.savebar{display:flex;gap:8px;margin-bottom:12px}
.savebar input{flex:1;font-family:var(--sans);font-size:15px;padding:11px 14px;border-radius:12px;border:1px solid var(--mist);background:var(--card);color:var(--ink)}
.savebar input:focus{outline:2px solid var(--indigo);outline-offset:1px}
.savebar .btn{flex:0 0 auto;padding:11px 18px}
.mdoc-link{text-align:right;margin-bottom:10px}
.mdoc-link button{background:none;border:none;font-size:12px;color:var(--indigo);cursor:pointer;font-family:var(--sans)}
.statetabs{display:flex;gap:6px;margin-bottom:14px}
.statetabs button{
  flex:1;font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 0;
  border-radius:999px;border:1px solid var(--mist);background:none;color:var(--ink-soft);cursor:pointer;
}
.statetabs button.on{background:var(--indigo-deep);border-color:var(--indigo-deep);color:#fff}
.doccard{
  display:flex;gap:12px;background:var(--card);border:1px solid var(--mist);
  border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;
}
.doccard .thumb{
  flex:0 0 56px;height:56px;border-radius:8px;background:var(--mist) center/cover no-repeat;
  font-family:var(--serif);font-size:22px;color:var(--indigo);
  display:flex;align-items:center;justify-content:center;
}
.doccard .body{flex:1;min-width:0}
.doccard h3{font-family:var(--serif);font-size:15.5px;font-weight:600;color:var(--indigo-deep);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.doccard .sub{font-size:12px;color:var(--ink-soft);margin-top:3px}
.doccard .sub .warn{color:var(--shu)}
.doccard .pbar{height:3px;border-radius:2px;background:var(--mist);margin-top:8px;overflow:hidden}
.doccard .pbar i{display:block;height:100%;background:var(--indigo);border-radius:2px}
.doccard .ops{display:flex;gap:12px;margin-top:6px}
.doccard .ops button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--indigo);font-family:var(--sans);padding:2px 0}
.doccard .ops button.danger{color:var(--shu)}

/* ---- 閱讀頁 ---- */
#view-reader{max-width:none;padding:0}
#reader-top{
  position:sticky;top:0;z-index:40;
  background:rgba(243,245,244,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--mist);
  padding:calc(10px + env(safe-area-inset-top)) 12px 10px;
  display:flex;align-items:center;gap:10px;
}
#reader-top button{background:none;border:none;font-family:var(--sans);font-size:14px;color:var(--indigo);cursor:pointer;padding:6px 8px}
#reader-top .rtitle{flex:1;font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
#reader-pbar{position:absolute;left:0;bottom:-1px;height:2px;background:var(--shu);width:0%}
#article{max-width:620px;margin:0 auto;padding:26px 22px 80px}
#article .ahead{margin-bottom:30px}
#article .ahead h2{font-family:var(--serif);font-size:calc(24px * var(--font-scale));line-height:1.6;color:var(--indigo-deep);margin-bottom:10px}
#article .ahead .ameta{font-size:13px;color:var(--ink-soft)}
#article .ahead .ameta a{color:var(--indigo);text-decoration:none;border-bottom:1px solid var(--mist)}
#resume-banner{
  background:var(--card);border:1px solid var(--mist);border-radius:10px;
  font-size:13px;color:var(--ink-soft);padding:10px 14px;margin-bottom:18px;
}
.blk{font-family:var(--serif);font-size:calc(17.5px * var(--font-scale));line-height:2.0;margin-bottom:1.1em;white-space:pre-wrap;overflow-wrap:break-word}
.blk.h1{font-size:calc(23px * var(--font-scale));font-weight:700;color:var(--indigo-deep);line-height:1.7;margin-top:1.6em}
.blk.h2{font-size:calc(20px * var(--font-scale));font-weight:700;color:var(--indigo-deep);line-height:1.7;margin-top:1.4em}
.blk.h3{font-size:calc(18px * var(--font-scale));font-weight:700;color:var(--indigo-deep);line-height:1.7;margin-top:1.2em}
.blk.quote{border-left:3px solid var(--mist);padding-left:16px;color:var(--ink-soft)}
.blk.li{padding-left:1.2em;position:relative}
.blk.li::before{content:'·';position:absolute;left:.3em;color:var(--indigo);font-weight:700}
.blk.code{font-family:ui-monospace,Menlo,monospace;font-size:calc(13.5px * var(--font-scale));line-height:1.7;background:var(--card);border:1px solid var(--mist);border-radius:10px;padding:14px;overflow-x:auto;white-space:pre}
.blk a{color:var(--indigo);text-decoration:none;border-bottom:1px solid var(--mist)}
.blk code{font-family:ui-monospace,Menlo,monospace;font-size:.85em;background:var(--card);border:1px solid var(--mist);border-radius:5px;padding:1px 5px}
figure.blkimg{margin:0 0 1.4em}
figure.blkimg img{max-width:100%;border-radius:10px;display:block;margin:0 auto}
mark[data-hl-ids]{background:var(--hl);color:inherit;border-radius:2px;padding:1px 0;cursor:pointer}
mark[data-hl-ids].flash{animation:hlflash 1.2s ease 2}
@keyframes hlflash{0%,100%{background:var(--hl)}50%{background:var(--shu);color:#fff}}
#reader-bottom{
  position:fixed;left:0;right:0;bottom:0;z-index:45;
  background:rgba(252,253,252,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--mist);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 10px calc(10px + env(safe-area-inset-bottom));
}
#reader-bottom button{background:none;border:none;font-family:var(--sans);font-size:13px;color:var(--indigo);cursor:pointer;padding:6px 10px}
#extract-fail{padding:30px 22px;text-align:center}
#extract-fail p{font-size:14px;color:var(--ink-soft);margin-bottom:16px;line-height:1.8}
#extract-fail .btn{max-width:260px;margin:0 auto 10px;display:block;width:100%}

/* ---- 選字浮層 / 劃線選單 ---- */
#sel-pop,#mark-pop{
  position:absolute;z-index:80;display:flex;gap:2px;
  background:var(--indigo-deep);border-radius:10px;padding:4px;
  box-shadow:0 4px 16px rgba(23,36,47,.3);
}
#sel-pop button,#mark-pop button{
  background:none;border:none;color:#fff;font-family:var(--sans);
  font-size:13px;padding:8px 12px;cursor:pointer;border-radius:7px;white-space:nowrap;
}
#sel-pop button:active,#mark-pop button:active{background:var(--indigo)}
#mark-pop button.danger{color:#F2A48E}

/* ---- 本篇劃線抽屜 ---- */
#hl-drawer{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:var(--card);border-radius:18px 18px 0 0;border:1px solid var(--mist);
  max-height:70vh;overflow:auto;padding:18px 18px calc(24px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(23,36,47,.18);
}
#hl-drawer h3{font-family:var(--serif);font-size:16px;color:var(--indigo-deep);margin-bottom:12px}
#hl-drawer .dhl{padding:10px 12px;border:1px solid var(--mist);border-radius:10px;margin-bottom:8px;cursor:pointer}
#hl-drawer .dhl blockquote{font-family:var(--serif);font-size:14.5px;line-height:1.8;white-space:pre-wrap}
#hl-drawer .dhl .dnote{font-size:12px;color:var(--ink-soft);margin-top:4px;white-space:pre-wrap}

/* ---- 回顧卡片 ---- */
.review-head{display:flex;justify-content:space-between;align-items:center;margin:6px 2px 14px}
.review-head .date{font-size:13px;color:var(--ink-soft);letter-spacing:.06em}
.review-head .right{display:flex;gap:12px;align-items:center}
.review-head .count{font-size:13px;color:var(--indigo);font-weight:500}
.streakbtn{background:none;border:none;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--shu);cursor:pointer;padding:2px 4px}
.qcard{
  position:relative;background:var(--card);border:1px solid var(--mist);
  border-radius:var(--radius);padding:26px 24px 22px 34px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(27,50,71,.06);
}
.qcard .spine{position:absolute;left:0;top:0;bottom:0;width:14px;border-radius:var(--radius) 0 0 var(--radius);background:var(--indigo)}
.qcard .vtag{position:absolute;left:16px;top:24px;writing-mode:vertical-rl;font-size:11px;letter-spacing:.24em;color:var(--indigo);max-height:70%;overflow:hidden;white-space:nowrap}
.qcard blockquote{font-family:var(--serif);font-size:19px;line-height:1.9;color:var(--ink);margin-bottom:16px;white-space:pre-wrap}
.qcard .src{font-size:13px;color:var(--ink-soft)}
.qcard .src b{color:var(--indigo-deep)}
.qcard .note{margin-top:12px;padding:10px 12px;background:var(--paper);border-radius:8px;font-size:14px;color:var(--ink-soft);white-space:pre-wrap}
.qcard .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.srclink{margin-top:8px}
.srclink a,.srclink button{font-size:12px;color:var(--indigo);text-decoration:none;border-bottom:1px solid var(--mist);background:none;border-top:none;border-left:none;border-right:none;cursor:pointer;font-family:var(--sans);padding:0}
.seal{
  position:absolute;right:18px;top:18px;width:40px;height:40px;
  border:2px solid var(--shu);border-radius:6px;color:var(--shu);
  font-family:var(--serif);font-weight:700;font-size:12px;line-height:1.15;
  display:flex;align-items:center;justify-content:center;text-align:center;
  transform:rotate(-4deg);opacity:.85;
}
.qactions{display:flex;gap:10px;margin-bottom:10px}
.qactions.sub{margin-bottom:22px}
.btn.fav{flex:0 0 52px}
.btn.fav.on{color:var(--shu);border-color:var(--shu)}
.done-banner{text-align:center;padding:56px 20px}
.done-banner .stamp{
  width:74px;height:74px;margin:0 auto 18px;
  border:3px solid var(--shu);border-radius:10px;color:var(--shu);
  font-family:var(--serif);font-weight:700;font-size:20px;
  display:flex;align-items:center;justify-content:center;transform:rotate(-5deg);
}
.done-banner p{color:var(--ink-soft);font-size:14px;margin-top:6px}

/* ---- overlay(日曆/表單)---- */
.overlay{position:fixed;inset:0;background:rgba(23,36,47,.45);z-index:70;display:flex;align-items:center;justify-content:center;padding:24px}
.obox{background:var(--card);border-radius:var(--radius);padding:20px;max-width:400px;width:100%;max-height:85vh;overflow:auto}
.obox h3{font-family:var(--serif);font-size:17px;color:var(--indigo-deep);margin-bottom:4px}
.obox .osub{font-size:12px;color:var(--ink-soft);margin-bottom:12px}
.cal-month h4{font-family:var(--serif);font-size:14px;color:var(--indigo-deep);margin:12px 0 6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-grid span{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);border-radius:6px}
.cal-grid span.hit{background:var(--shu);color:#fff;font-weight:500}
.cal-grid span.future{opacity:.3}
.obox .close{width:100%;margin-top:16px}
.obox form label{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);margin:14px 2px 6px}
.obox form input,.obox form textarea{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);padding:11px 13px;border-radius:10px;border:1px solid var(--mist);background:var(--paper)}
.obox form textarea{resize:vertical;min-height:120px;line-height:1.8}
.obox form input:focus,.obox form textarea:focus{outline:2px solid var(--indigo);outline-offset:1px}
.obox form .btn{width:100%;margin-top:18px}

/* ---- 劃線庫 ---- */
.searchbar{display:flex;gap:8px;margin-bottom:14px}
.searchbar input{flex:1;font-family:var(--sans);font-size:15px;padding:11px 14px;border-radius:12px;border:1px solid var(--mist);background:var(--card);color:var(--ink)}
.searchbar input:focus{outline:2px solid var(--indigo);outline-offset:1px}
.searchbar .btn{flex:0 0 auto;padding:11px 16px}
.group-title{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--indigo-deep);margin:20px 2px 10px;display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.group-title small{font-family:var(--sans);font-weight:400;font-size:12px;color:var(--ink-soft);white-space:nowrap}
.lcard{background:var(--card);border:1px solid var(--mist);border-radius:12px;padding:16px 16px 12px;margin-bottom:10px}
.lcard.discarded{opacity:.55}
.lcard blockquote{font-family:var(--serif);font-size:15.5px;line-height:1.85;margin-bottom:8px;white-space:pre-wrap}
.lcard .lnote{margin:0 0 8px;padding:8px 10px;background:var(--paper);border-radius:8px;font-size:13px;color:var(--ink-soft);white-space:pre-wrap}
.lcard .meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;gap:6px}
.lcard .meta .ops{display:flex;gap:14px}
.lcard .meta button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--indigo);font-family:var(--sans);padding:4px 0}
.lcard .meta button.danger{color:var(--shu)}

/* ---- 匯出/設定 ---- */
.export-box{background:var(--card);border:1px solid var(--mist);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.export-box h3{font-family:var(--serif);font-size:16px;color:var(--indigo-deep);margin-bottom:6px}
.export-box p{font-size:13px;color:var(--ink-soft);margin-bottom:12px}
.export-box .setrow{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.export-box .setrow label{flex:1;font-size:13px;color:var(--ink-soft)}
.export-box .setrow input{width:110px;font-family:var(--sans);font-size:15px;padding:9px 12px;border-radius:10px;border:1px solid var(--mist);background:var(--paper);color:var(--ink)}
.export-box .setrow input.wide{width:100%;flex:2}
.export-box .setrow .btn{flex:0 0 auto;padding:9px 20px;font-size:14px}

.toast{
  position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(8px);
  background:var(--indigo-deep);color:#fff;font-size:13px;
  padding:9px 18px;border-radius:999px;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:90;white-space:nowrap;
  max-width:88vw;overflow:hidden;text-overflow:ellipsis;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <h1>拾句<span>SHIJU · 稍後讀</span></h1>
  <button id="userchip" class="hidden" title="點擊登出"></button>
</header>

<main>
  <!-- 登入 -->
  <section id="view-login">
    <div class="mark">拾</div>
    <h2>拾句 · 稍後讀與書摘回顧</h2>
    <p>存下想讀的文章,舒服地讀完,<br>劃下重點,每天回顧。</p>
    <button id="login-btn">使用 Google 登入</button>
    <div id="login-hint"></div>
  </section>

  <!-- 收件匣 -->
  <section id="view-inbox" class="hidden">
    <div class="savebar">
      <input id="save-url" type="url" placeholder="貼上文章網址…" aria-label="文章網址">
      <button class="btn primary" id="save-url-btn">存入</button>
    </div>
    <div class="mdoc-link">
      <button id="manual-doc-btn">+ 手動輸入內文(實體書 / FB 貼文)</button>
    </div>
    <div class="statetabs" id="statetabs">
      <button data-state="inbox" class="on">收件匣</button>
      <button data-state="later">稍後</button>
      <button data-state="archive">封存</button>
    </div>
    <div id="doc-list"></div>
  </section>

  <!-- 閱讀頁 -->
  <section id="view-reader" class="hidden">
    <div id="reader-top">
      <button id="reader-back">‹ 返回</button>
      <div class="rtitle" id="reader-title"></div>
      <button id="reader-font-minus" title="縮小字級">A−</button>
      <button id="reader-font-plus" title="放大字級">A＋</button>
      <div id="reader-pbar"></div>
    </div>
    <div id="article"></div>
    <div id="reader-bottom">
      <button id="rb-hls">本篇劃線</button>
      <button id="rb-later">移到稍後</button>

        savedAt: b.createdAt || serverTimestamp(), extractStatus: 'manual'

        const k = groupKey(h);

        groups.get(k).push(h);

        const [title, author] = JSON.parse(k);

          title, author: author || null,
          sourceUrl: list.find(h => h.url)?.url || null, siteName: null, coverUrl: null,
          category: 'manual', state: 'archive', wordCount: 0, readingProgress: 0,
          lastPosition: 0, frequency: 1, highlightCount: list.length,
          savedAt: serverTimestamp(), extractStatus: 'manual'

    if (b.type === 'img') continue;
    const cjk = (b.text.match(/[一-鿿぀-ヿ가-힯]/g) || []).length;
    const words = (b.text.replace(/[一-鿿぀-ヿ가-힯]/g, ' ').match(/[A-Za-z0-9]+/g) || []).length;
    n += cjk + words;
  }
  return n;
}

/* ================================================================
   內容擷取(§5)— Jina Reader 直連(CORS 已驗證可行);
   設定頁可填自訂端點(方案 B 備援)。
   ================================================================ */
async function extractUrl(url) {
  const custom = settings().extractEndpoint;
  if (custom) {
    const r = await fetch(custom, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (!r.ok) throw new Error('endpoint ' + r.status);
    const j = await r.json();
    return { title: j.title, author: j.author || null, markdown: j.markdown || j.content, coverUrl: j.coverUrl || null };
  }
  const r = await fetch('https://r.jina.ai/' + url, { headers: { 'Accept': 'application/json' } });
  if (!r.ok) throw new Error('jina ' + r.status);
  const { data } = await r.json();
  if (!data?.content) throw new Error('empty content');
  return {
    title: data.title || url, author: data.metadata?.author || null,
    markdown: data.content, coverUrl: data.metadata?.['og:image'] || null
  };
}

async function saveUrl(url) {
  url = (url || '').trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  let host = '';
  try { host = new URL(url).hostname.replace(/^www\./, ''); } catch (e) { toast('網址格式不正確'); return; }
  if (/(^|\.)facebook\.com$|(^|\.)fb\.com$/.test(host)) {
    toast('Facebook 貼文無法自動擷取,請手動貼上內文');
    openManualDoc({ url });
    return;
  }
  const id = uid();
  try {
    // 先寫 document(pending),UI 立刻看得到,再背景擷取(§4.1)
    await setDoc(docRef(id), {
      title: url, author: null, sourceUrl: url, siteName: host, coverUrl: null,
      category: 'article', state: 'inbox', wordCount: 0, readingProgress: 0,
      lastPosition: 0, frequency: 1, highlightCount: 0,
      savedAt: serverTimestamp(), extractStatus: 'pending'
    });
  } catch (e) { toast('儲存失敗:' + (e.code || e.message)); return; }
  switchView('inbox'); setInboxState('inbox');
  toast('已加入收件匣,擷取中…');
  runExtraction(id, url);
}
async function runExtraction(id, url) {
  try {
    const ex = await extractUrl(url);
    const blocks = parseMarkdown(ex.markdown);
    if (!blocks.length) throw new Error('內文為空');
    const cover = ex.coverUrl || blocks.find(b => b.type === 'img')?.src || null;
    await setDoc(contentRef(id), { markdown: ex.markdown, blocks });
    await updateDoc(docRef(id), {
      title: ex.title || url, author: ex.author, coverUrl: cover,
      wordCount: countWords(blocks), extractStatus: 'ok'
    });
    contentCache.set(id, { markdown: ex.markdown, blocks });
    toast('「' + (ex.title || url).slice(0, 18) + '」擷取完成');
  } catch (e) {
    try { await updateDoc(docRef(id), { extractStatus: 'failed' }); } catch (e2) {}
    toast('擷取失敗:' + e.message);
  }
}

function blockHTML(b) {
  if (b.type === 'img') {
    return '<figure class="blkimg"><img src="' + esc(b.src) + '" alt="' + esc(b.text) + '" loading="lazy"></figure>';
  }
  const cls = { h1: 'h1', h2: 'h2', h3: 'h3', quote: 'quote', li: 'li', code: 'code' }[b.type] || 'p';
  const tag = b.type === 'quote' ? 'blockquote' : b.type === 'code' ? 'pre' : 'div';
  const inner = b.type === 'code' ? esc(b.text) : inlineHTML(b.md);
  return '<' + tag + ' class="blk ' + cls + '" data-block-index="' + b.i + '">' + inner + '</' + tag + '>';
}

/* ---- 劃線渲染:offsets → DOM <mark>(跨行內格式邊界也能包)---- */
function computeSegments(intervals, len) {
  // 合併重疊區間 → [{s,e,ids}]:重疊劃線合併顯示(§4.3)
  const sorted = intervals.filter(x => x.s < x.e).sort((a, b) => a.s - b.s || a.e - b.e);
  const out = [];
  for (const iv of sorted) {
    const s = clamp(iv.s, 0, len), e = clamp(iv.e, 0, len);
    if (s >= e) continue;
    const last = out[out.length - 1];
    if (last && s <= last.e) { last.e = Math.max(last.e, e); last.ids.push(iv.id); }
    else out.push({ s, e, ids: [iv.id] });
  }
  return out;
}
function applyMarksToBlock(blockEl, segs) {
  if (!segs.length) return;
  const walker = document.createTreeWalker(blockEl, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);
  let offset = 0;
  for (const node of nodes) {
    const start = offset, end = offset + node.nodeValue.length;
    offset = end;
    const overlaps = segs.filter(sg => sg.s < end && sg.e > start);
    if (!overlaps.length) continue;
    const frag = document.createDocumentFragment();
    let pos = 0;
    for (const sg of overlaps) {
      const s = Math.max(0, sg.s - start), e = Math.min(node.nodeValue.length, sg.e - start);
      if (s > pos) frag.appendChild(document.createTextNode(node.nodeValue.slice(pos, s)));
      const mark = document.createElement('mark');
      mark.dataset.hlIds = sg.ids.join(',');
      mark.textContent = node.nodeValue.slice(s, e);
      frag.appendChild(mark);
      pos = e;
    }
    if (pos < node.nodeValue.length) frag.appendChild(document.createTextNode(node.nodeValue.slice(pos)));
    node.parentNode.replaceChild(frag, node);
  }
}
function refreshBlockMarks(bi) {
  if (!READER) return;
  const el = document.querySelector('#article [data-block-index="' + bi + '"]');
  const blk = READER.blocks[bi];
  if (!el || !blk) return;
  // 先還原乾淨 HTML 再套 mark,避免重複包
  el.innerHTML = blk.type === 'code' ? esc(blk.text) : inlineHTML(blk.md);
  const ivs = HL.filter(h => h.docId === READER.docId && h.blockIndex === bi)
    .map(h => ({ s: h.startOffset, e: h.endOffset, id: h.id }));
  applyMarksToBlock(el, computeSegments(ivs, blk.text.length));
}
function applyAllMarks() {
  if (!READER) return;
  const bis = new Set(HL.filter(h => h.docId === READER.docId && h.blockIndex != null).map(h => h.blockIndex));
  for (const bi of bis) refreshBlockMarks(bi);
}
function scrollToHighlight(hlId) {

/* ---- 建立劃線:selection → (blockIndex, startOffset, endOffset)(§4.3)---- */
function anchorFromSelection() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  const el = range.startContainer.nodeType === 1 ? range.startContainer : range.startContainer.parentElement;
  const blockEl = el?.closest?.('[data-block-index]');
  if (!blockEl || !$('#article')?.contains(blockEl)) return null;
  const bi = parseInt(blockEl.dataset.blockIndex, 10);
  const blk = READER?.blocks[bi];
  if (!blk) return null;
  // 從 block 起點到 selection 起點的純文字長度 = startOffset(§4.3 步驟 3)
  const pre = document.createRange();
  pre.selectNodeContents(blockEl);
  pre.setEnd(range.startContainer, range.startOffset);
  const start = pre.toString().length;
  let end;
  const endInBlock = blockEl.contains(range.endContainer);
  if (endInBlock) {
    const pre2 = document.createRange();
    pre2.selectNodeContents(blockEl);
    pre2.setEnd(range.endContainer, range.endOffset);
    end = pre2.toString().length;
  } else {
    end = blk.text.length; // 跨 block:截斷到本 block 結尾(§3.3)
  }
  if (end <= start) return null;
  const text = blk.text.slice(start, end);
  // 驗證錨點,不相等就中止(§4.3 步驟 4)
  const selText = sel.toString();
  const ok = endInBlock ? text === selText : selText.startsWith(text);
  if (!ok) return null;
  return { blockIndex: bi, startOffset: start, endOffset: end, text };
}

/* ---- 選字浮層 ---- */
function hidePops() { $('#sel-pop').classList.add('hidden'); $('#mark-pop').classList.add('hidden'); }
function positionPop(pop, rect) {
  pop.classList.remove('hidden');
  const top = rect.bottom + window.scrollY + 8;
  let left = rect.left + window.scrollX + rect.width / 2 - pop.offsetWidth / 2;
  left = clamp(left, 8, window.innerWidth - pop.offsetWidth - 8);
  pop.style.top = top + 'px'; pop.style.left = left + 'px';
}
let _selTimer = null;
document.addEventListener('selectionchange', () => {
  if (!READER) return;
  clearTimeout(_selTimer);
  _selTimer = setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) { $('#sel-pop').classList.add('hidden'); pendingSel = null; return; }
    const anchor = anchorFromSelection();
    if (!anchor) { $('#sel-pop').classList.add('hidden'); pendingSel = null; return; }
    pendingSel = anchor;
    positionPop($('#sel-pop'), sel.getRangeAt(0).getBoundingClientRect());
  }, 250);
});

  drawer.querySelectorAll('[data-goto]').forEach(el => el.onclick = () => {
    drawer.classList.add('hidden');
    scrollToHighlight(el.dataset.goto);
  });
};
$('#rb-later').onclick = async () => {

  catch (e) { toast('儲存失敗'); }
};
$('#rb-archive').onclick = async () => {

/* ---- 字級 ---- */
async function bumpFont(delta) {
  const v = clamp(Math.round((settings().fontScale + delta) * 10) / 10, 0.8, 1.4);
  if (!META.settings) META.settings = {};
  META.settings.fontScale = v;
  applyFontScale();
  try { await saveMeta(); } catch (e) {}
}
$('#reader-font-plus').onclick = () => bumpFont(0.1);
$('#reader-font-minus').onclick = () => bumpFont(-0.1);

/* ---- 閱讀進度(§6.2:throttle 3 秒,離開時強制寫)---- */
const writeProgress = throttle(() => {
  const p = currentProgress();
  if (!p || !READER || !USER) return;
  updateDoc(docRef(READER.docId), { readingProgress: p.progress, lastPosition: p.block }).catch(() => {});
}, 3000);
function currentProgress() {
  if (!READER) return null;
  const blockEls = document.querySelectorAll('#article [data-block-index]');
  if (!blockEls.length) return null;
  let block = 0;
  for (const el of blockEls) {
    if (el.getBoundingClientRect().top > 90) break;
    block = parseInt(el.dataset.blockIndex, 10);
  }
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const progress = max > 0 ? clamp(window.scrollY / max, 0, 1) : 1;
  return { block, progress: Math.round(progress * 1000) / 1000 };
}
function flushProgress() {
  const p = currentProgress();
  if (!p || !READER || !USER) return;
  updateDoc(docRef(READER.docId), { readingProgress: p.progress, lastPosition: p.block }).catch(() => {});
}
window.addEventListener('scroll', () => {
  if (!READER) return;
  const p = currentProgress();
  if (p) $('#reader-pbar').style.width = (p.progress * 100) + '%';
  writeProgress();
});
window.addEventListener('pagehide', () => { if (READER) flushProgress(); });

/* ================================================================
   間隔重複 (§7) 與每日回顧 — 沿用既有引擎,來源改為 documents
   ================================================================ */
function recallP(h, now) {
  const ref = h.srs?.lastReviewed?.seconds ? h.srs.lastReviewed.seconds * 1000
            : (h.createdAt?.seconds ? h.createdAt.seconds * 1000 : now);
  const days = Math.max(0, (now - ref) / 86400000);
  return Math.pow(2, -days / (h.srs?.halfLife || SRS.initialHalfLife));
}
function seededRand(seed) { return () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }; }
function pickDaily(cand) {
  const now = Date.now();
  const N = Math.min(settings().dailyCount, cand.length);
  const rnd = seededRand(parseInt(SESSION_DATE.replace(/-/g, ''), 10));
  const pool = [...cand].sort((a, b) => (a.id < b.id ? -1 : 1)).map(h => ({
    id: h.id,
    w: Math.max(SRS.poolFloor, (1 - recallP(h, now)) * (DOCS[h.docId]?.frequency ?? 1))
  }));
  const out = [];
  while (out.length < N && pool.length) {
    const total = pool.reduce((s, x) => s + x.w, 0);
    let r = rnd() * total, i = 0;
    for (; i < pool.length - 1; i++) { r -= pool[i].w; if (r <= 0) break; }
    out.push(pool[i].id);
    pool.splice(i, 1);
  }
  return out;
}
const activeHL = () => HL.filter(h => !h.discarded && h.text !== undefined);

async function ensureSession() {
  if (!SESSION_LOADED || creatingSession) return;
  if (SESSION && (SESSION.cards || []).length) return;
  const cand = activeHL();
  if (!cand.length) return;
  creatingSession = true;
  try {
    await setDoc(sessRef(), {
      date: SESSION_DATE, cards: pickDaily(cand),
      done: SESSION?.done || [], createdAt: serverTimestamp()
    });
  } catch (e) { toast('建立今日回顧失敗:' + (e.code || e.message)); }
  creatingSession = false;
}
function sessionComplete(doneSet) {
  return SESSION.cards.every(id => {
    const h = hlById(id);
    return doneSet.has(id) || !h || h.discarded;
  });
}
async function markDone(id) {
  const doneSet = new Set([...(SESSION.done || []), id]);
  await updateDoc(sessRef(), { done: arrayUnion(id) });
  if (sessionComplete(doneSet)) await recordCompletion();
}
async function recordCompletion() {
  const t = todayStr();
  if (META.streak?.history?.[t]) return;
  if (!META.streak) META.streak = { history: {} };
  if (!META.streak.history) META.streak.history = {};
  META.streak.history[t] = true;
  try { await saveMeta(); } catch (e) {}
}
function calcStreak() {
  const hist = META.streak?.history || {};
  let n = 0;
  const d = new Date();
  if (!hist[dateKey(d)]) d.setDate(d.getDate() - 1);
  while (hist[dateKey(d)]) { n++; d.setDate(d.getDate() - 1); }
  return n;
}

function renderReview() {
  if (SESSION_DATE !== todayStr()) { subscribeSession(); return; }
  const d = new Date();
  $('#today-date').textContent = d.getFullYear() + ' 年 ' + (d.getMonth() + 1) + ' 月 ' + d.getDate() + ' 日 · 週' + '日一二三四五六'[d.getDay()];
  $('#streak-chip').textContent = '🔥 ' + calcStreak();
  const stage = $('#review-stage');
  if (!HL_LOADED || !SESSION_LOADED || !DOCS_LOADED) {
    $('#review-progress').textContent = '';
    stage.innerHTML = '<div class="empty"><p>載入中…</p></div>';
    return;
  }
  const cand = activeHL();
  if (!cand.length && !(SESSION?.cards || []).length) {
    $('#review-progress').textContent = '';
    stage.innerHTML = '<div class="empty"><div class="glyph">今</div><p>還沒有劃線。<br>存一篇文章、讀它、劃下重點,<br>明天它就會出現在這裡。</p></div>';
    return;
  }
  if (!SESSION || !(SESSION.cards || []).length) {
    ensureSession();
    stage.innerHTML = '<div class="empty"><p>準備今日卡片…</p></div>';
    return;
  }
  const doneSet = new Set(SESSION.done || []);
  const remaining = SESSION.cards.filter(id => {
    const h = hlById(id);
    return !doneSet.has(id) && h && !h.discarded;
  });
  const doneCount = SESSION.cards.length - remaining.length;
  $('#review-progress').textContent = '今日 ' + doneCount + ' / ' + SESSION.cards.length;
  if (!remaining.length) {
    recordCompletion();
    stage.innerHTML = '<div class="done-banner"><div class="stamp">回顧<br>畢</div><div style="font-family:var(--serif);font-size:18px;font-weight:700;color:var(--indigo-deep)">今日回顧完成</div><p>連續回顧 ' + calcStreak() + ' 天。明天會有新的一組句子。</p></div>';
    return;
  }
  const h = hlById(remaining[0]);
  const src = DOCS[h.docId] || { title: '未分類', author: '', frequency: 1 };
  const freq = src.frequency ?? 1;
  const canGoto = h.blockIndex != null && (src.extractStatus === 'ok' || src.extractStatus === 'manual');
  stage.innerHTML = `
    <article class="qcard">
      <div class="spine"></div>
      <div class="vtag">${esc(src.title)}</div>
      <div class="seal">${(h.srs?.reviewCount || 0)}<br>回</div>
      <blockquote>${esc(h.text)}</blockquote>
      <div class="src"><b>${esc(src.title)}</b>${src.author ? ' · ' + esc(src.author) : ''}${src.siteName ? ' · ' + esc(src.siteName) : ''}</div>
      <div class="srclink">
        ${canGoto ? '<button id="goto-src">回到原文 →</button>' : (src.sourceUrl ? '<a href="' + esc(src.sourceUrl) + '" target="_blank" rel="noopener">原文連結 →</a>' : '')}
      </div>
      ${h.note ? '<div class="note">' + esc(h.note) + '</div>' : ''}
      ${h.tags && h.tags.length ? '<div class="tags">' + h.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') + '</div>' : ''}
    </article>
    <div class="qactions">
      <button class="btn fav ${h.favorited ? 'on' : ''}" id="fav-btn" aria-label="收藏">${h.favorited ? '♥' : '♡'}</button>
      <button class="btn primary" id="next-btn">已讀,下一句</button>
    </div>
    <div class="qactions sub">
      <button class="btn sm" id="note-btn">註解</button>
      <button class="btn sm" id="discard-btn">移出輪替</button>
      <button class="btn sm" id="tune-down" title="降低此來源出現頻率">頻率 ↓</button>
      <button class="btn sm" id="tune-up" title="提高此來源出現頻率">頻率 ↑ ×${freq}</button>
    </div>`;
  $('#next-btn').onclick = async () => {
    try {
      const half = clamp((h.srs?.halfLife || SRS.initialHalfLife) * SRS.growthFactor, SRS.minHalfLife, SRS.maxHalfLife);
      await updateDoc(hlRef(h.id), {
        'srs.halfLife': half, 'srs.lastReviewed': serverTimestamp(), 'srs.reviewCount': increment(1)
      });
      await markDone(h.id);
    } catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#fav-btn').onclick = async () => {
    try { await updateDoc(hlRef(h.id), { favorited: !h.favorited }); }
    catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#discard-btn').onclick = async () => {
    if (!confirm('移出回顧輪替?(仍會保留在原文與劃線庫)')) return;
    try {
      await updateDoc(hlRef(h.id), { discarded: true });
      await markDone(h.id);
      toast('已移出輪替');
    } catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#note-btn').onclick = async () => {
    const note = prompt('註解:', h.note || '');
    if (note === null) return;
    try { await updateDoc(hlRef(h.id), { note: note.trim() }); }
    catch (e) { toast('儲存失敗,請重試'); }
  };
  const tune = async dir => {
    if (!DOCS[h.docId]) { toast('找不到此來源'); return; }
    const nf = clamp(freq * (dir > 0 ? 2 : 0.5), SRS.minFreq, SRS.maxFreq);
    try {
      await updateDoc(docRef(h.docId), { frequency: nf });
      toast('「' + src.title.slice(0, 12) + '」出現頻率 ×' + nf);
    } catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#tune-up').onclick = () => tune(1);
  $('#tune-down').onclick = () => tune(-1);
  const gt = $('#goto-src');
  if (gt) gt.onclick = () => openDoc(h.docId, { scrollToHl: h.id });
}

/* ---------- streak 日曆 ---------- */
function showCalendar() {
  const hist = META.streak?.history || {};
  $('#cal-streak').textContent = '連續 ' + calcStreak() + ' 天 · 近 365 天完成 ' + Object.keys(hist).length + ' 天';
  const now = new Date();
  let html = '';
  for (let m = 2; m >= 0; m--) {
    const first = new Date(now.getFullYear(), now.getMonth() - m, 1);
    const days = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
    html += '<div class="cal-month"><h4>' + first.getFullYear() + ' 年 ' + (first.getMonth() + 1) + ' 月</h4><div class="cal-grid">';
    for (let i = 0; i < first.getDay(); i++) html += '<span></span>';
    for (let day = 1; day <= days; day++) {
      const key = dateKey(new Date(first.getFullYear(), first.getMonth(), day));
      html += '<span class="' + (hist[key] ? 'hit' : '') + (key > todayStr() ? ' future' : '') + '">' + day + '</span>';
    }
    html += '</div></div>';
  }
  $('#cal-body').innerHTML = html;
  $('#cal-overlay').classList.remove('hidden');
}
$('#streak-chip').onclick = showCalendar;
$('#cal-close').onclick = () => $('#cal-overlay').classList.add('hidden');
$('#cal-overlay').onclick = e => { if (e.target.id === 'cal-overlay') $('#cal-overlay').classList.add('hidden'); };

/* ---------- 劃線庫 ---------- */
function renderHlLibrary() {
  const q = ($('#search').value || '').trim().toLowerCase();
  const list = $('#hl-list');
  let items = HL.filter(h => h.text !== undefined);
  if (q) items = items.filter(h => {
    const d = DOCS[h.docId];
    return (h.text || '').toLowerCase().includes(q) ||
      (d?.title || '').toLowerCase().includes(q) ||
      (d?.author || '').toLowerCase().includes(q) ||
      (h.note || '').toLowerCase().includes(q) ||
      (h.tags || []).some(t => t.toLowerCase().includes(q));
  });
  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><div class="glyph">庫</div><p>' + (q ? '找不到符合的劃線。' : '還沒有劃線。<br>在文章裡選取文字即可劃線。') + '</p></div>';
    return;
  }
  const groups = {};
  items.forEach(h => { (groups[h.docId] = groups[h.docId] || []).push(h); });
  const dids = Object.keys(groups).sort((a, b) => (DOCS[a]?.title || '').localeCompare(DOCS[b]?.title || '', 'zh-Hant'));
  list.innerHTML = dids.map(did => {
    const d = DOCS[did] || { title: '未分類', author: '' };
    const g = groups[did];
    const freq = d.frequency ?? 1;
    return '<div class="group-title">' + esc(d.title) + (d.author ? ' <small>' + esc(d.author) + '</small>' : '') +
      '<small>' + g.length + ' 則' + (freq !== 1 ? ' · 頻率×' + freq : '') + '</small></div>' +
      g.map(h => `
      <div class="lcard${h.discarded ? ' discarded' : ''}">
        <blockquote>${esc(h.text)}</blockquote>
        ${h.note ? '<div class="lnote">' + esc(h.note) + '</div>' : ''}
        <div class="meta">
          <span>${h.favorited ? '♥ ' : ''}回顧 ${(h.srs?.reviewCount || 0)} 次${h.discarded ? ' · 已移出輪替' : ''}${h.tags && h.tags.length ? ' · ' + h.tags.map(esc).join('、') : ''}</span>
          <span class="ops">
            ${h.blockIndex != null ? '<button data-lgoto="' + h.id + '">原文</button>' : ''}
            <button data-lfav="${h.id}">${h.favorited ? '取消收藏' : '收藏'}</button>
            <button data-ldisc="${h.id}">${h.discarded ? '恢復' : '移出'}</button>
            <button data-lnote="${h.id}">註解</button>
            <button data-ldel="${h.id}" class="danger">刪除</button>
          </span>
        </div>
      </div>`).join('');
  }).join('');
  list.querySelectorAll('[data-lgoto]').forEach(b => b.onclick = () => {
    const h = hlById(b.dataset.lgoto);
    if (h) openDoc(h.docId, { scrollToHl: h.id });
  });
  list.querySelectorAll('[data-lfav]').forEach(b => b.onclick = async () => {
    const h = hlById(b.dataset.lfav); if (!h) return;
    try { await updateDoc(hlRef(h.id), { favorited: !h.favorited }); }
    catch (e) { toast('儲存失敗,請重試'); }
  });
  list.querySelectorAll('[data-ldisc]').forEach(b => b.onclick = async () => {
    const h = hlById(b.dataset.ldisc); if (!h) return;
    try {
      await updateDoc(hlRef(h.id), { discarded: !h.discarded });
      toast(h.discarded ? '已恢復輪替' : '已移出輪替');
    } catch (e) { toast('儲存失敗,請重試'); }
  });
  list.querySelectorAll('[data-lnote]').forEach(b => b.onclick = async () => {
    const h = hlById(b.dataset.lnote); if (!h) return;
    const note = prompt('註解:', h.note || '');
    if (note === null) return;
    try { await updateDoc(hlRef(h.id), { note: note.trim() }); }
    catch (e) { toast('儲存失敗,請重試'); }
  });
  list.querySelectorAll('[data-ldel]').forEach(b => b.onclick = async () => {
    const h = hlById(b.dataset.ldel);
    if (!h || !confirm('確定刪除這則劃線?')) return;
    try {
      await deleteDoc(hlRef(h.id));
      if (DOCS[h.docId]) await updateDoc(docRef(h.docId), { highlightCount: increment(-1) });
      toast('已刪除');
    } catch (e) { toast('刪除失敗,請重試'); }
  });
}

/* ---------- 手動新增劃線(含舊版 ?quote= 捷徑)---------- */
function openManualHl(pre) {
  $('#mh-text').value = pre?.quote || '';
  $('#mh-source').value = pre?.source || '';
  $('#mh-author').value = ''; $('#mh-note').value = ''; $('#mh-tags').value = '';
  $('#mhl-overlay').dataset.url = pre?.url || '';
  $('#mhl-overlay').classList.remove('hidden');
}
$('#manual-hl-btn').onclick = () => openManualHl();
$('#mh-cancel').onclick = () => $('#mhl-overlay').classList.add('hidden');
$('#mh-save').onclick = async () => {
  const text = $('#mh-text').value.trim(), title = $('#mh-source').value.trim();
  if (!text || !title) { toast('請填寫摘錄內容與出處'); return; }
  const author = $('#mh-author').value.trim() || null;
  const url = $('#mhl-overlay').dataset.url || null;
  try {
    let d = Object.values(DOCS).find(x => x.title === title && (x.author || null) === author && x.category === 'manual');
    let did = d?.id;
    if (!did) {
      did = uid();
      await setDoc(docRef(did), {
        title, author, sourceUrl: url, siteName: null, coverUrl: null,
        category: 'manual', state: 'archive', wordCount: 0, readingProgress: 0,
        lastPosition: 0, frequency: 1, highlightCount: 0,
        savedAt: serverTimestamp(), extractStatus: 'manual'
      });
      DOCS[did] = { id: did, title, author, category: 'manual', frequency: 1, extractStatus: 'manual' };
    }
    await setDoc(hlRef(uid()), {
      docId: did, text, note: $('#mh-note').value.trim(),
      tags: $('#mh-tags').value.split(/[,,、]/).map(s => s.trim()).filter(Boolean),
      color: 'yellow', blockIndex: null, startOffset: null, endOffset: null,
      favorited: false, discarded: false, createdAt: serverTimestamp(),
      srs: { halfLife: SRS.initialHalfLife, lastReviewed: null, reviewCount: 0 }
    });
    await updateDoc(docRef(did), { highlightCount: increment(1) });
    $('#mhl-overlay').classList.add('hidden');
    toast('已存入,將進入每日回顧');
  } catch (e) { toast('儲存失敗:' + (e.code || e.message)); }
};

/* ---------- 匯出/設定 ---------- */
function toMarkdown() {
  const groups = {};
  HL.filter(h => h.text !== undefined).forEach(h => { (groups[h.docId] = groups[h.docId] || []).push(h); });
  const dids = Object.keys(groups).sort((a, b) => (DOCS[a]?.title || '').localeCompare(DOCS[b]?.title || '', 'zh-Hant'));
  return dids.map(did => {
    const d = DOCS[did] || { title: '未分類' };
    let md = '## ' + d.title + (d.author ? ' — ' + d.author : '') + '\n\n';
    if (d.sourceUrl) md += d.sourceUrl + '\n\n';
    groups[did].forEach(h => {
      md += '> ' + h.text.replace(/\n/g, '\n> ') + '\n\n';
      if (h.note) md += '筆記:' + h.note + '\n\n';
      if (h.tags && h.tags.length) md += '標籤:' + h.tags.map(t => '#' + t).join(' ') + '\n\n';
    });
    return md;
  }).join('---\n\n') || '(尚無劃線)';
}
async function copyText(txt, msg) {
  try { await navigator.clipboard.writeText(txt); toast(msg); }
  catch (e) {
    const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove(); toast(msg);
  }
}
$('#copy-md').onclick = () => copyText(toMarkdown(), 'Markdown 已複製');
$('#copy-json').onclick = () => copyText(JSON.stringify({ documents: Object.values(DOCS), highlights: HL, meta: META }, null, 2), 'JSON 已複製');
$('#save-settings').onclick = async () => {
  const v = clamp(parseInt($('#set-daily').value, 10) || SRS.defaultDaily, 3, 50);
  $('#set-daily').value = v;
  if (!META.settings) META.settings = {};
  META.settings.dailyCount = v;
  META.settings.extractEndpoint = $('#set-extract').value.trim();
  try { await saveMeta(); toast('已儲存(每日數量明日生效)'); }
  catch (e) { toast('儲存失敗,請重試'); }
};
function renderExport() {
  const items = HL.filter(h => h.text !== undefined);
  const rv = items.reduce((s, h) => s + (h.srs?.reviewCount || 0), 0);
  $('#stats').textContent = Object.keys(DOCS).length + ' 篇文章/來源 · ' + items.length + ' 則劃線 · 累計回顧 ' + rv + ' 次 · 連續 ' + calcStreak() + ' 天';
  if (document.activeElement !== $('#set-daily')) $('#set-daily').value = settings().dailyCount;
  if (document.activeElement !== $('#set-extract')) $('#set-extract').value = settings().extractEndpoint;
}

/* ---------- 分頁切換 ---------- */
function switchView(v) {
  if (READER) closeReader();
  currentView = v;
  ['inbox', 'review', 'highlights', 'export'].forEach(x => {
    $('#view-' + x).classList.toggle('hidden', x !== v);
    document.querySelector('nav [data-view="' + x + '"]')?.classList.toggle('on', x === v);
  });
  rerender();
  window.scrollTo(0, 0);
}
document.querySelectorAll('nav button').forEach(b => b.onclick = () => switchView(b.dataset.view));
$('#search').addEventListener('input', renderHlLibrary);
