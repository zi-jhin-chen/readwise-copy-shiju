<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>拾句 — 書摘回顧</title>
<meta name="theme-color" content="#1B3247">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="拾句">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F5F4; --card:#FCFDFC;
  --ink:#17242F; --ink-soft:#4A5B68;
  --indigo:#2C4A63; --indigo-deep:#1B3247;
  --mist:#D4DDE0; --shu:#C4462B;
  --radius:14px;
  --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--paper);color:var(--ink);
  font-size:16px;line-height:1.6;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
}
header{
  padding:calc(16px + env(safe-area-inset-top)) 20px 12px;
  display:flex;align-items:baseline;justify-content:space-between;
}
header h1{font-family:var(--serif);font-weight:700;font-size:26px;letter-spacing:.12em;color:var(--indigo-deep)}
header h1 span{font-size:12px;letter-spacing:.28em;color:var(--ink-soft);font-family:var(--sans);font-weight:500;margin-left:10px}
#userchip{font-size:12px;color:var(--ink-soft);cursor:pointer;background:none;border:none;font-family:var(--sans)}
main{padding:0 16px;max-width:640px;margin:0 auto}
.hidden{display:none!important}

/* ---- 登入畫面 ---- */
#view-login{text-align:center;padding-top:12vh}
#view-login .mark{
  width:88px;height:88px;margin:0 auto 22px;border-radius:20px;
  background:var(--indigo-deep);color:var(--paper);
  font-family:var(--serif);font-weight:700;font-size:44px;
  display:flex;align-items:center;justify-content:center;position:relative;
}
#view-login .mark::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:var(--indigo);border-radius:20px 0 0 20px}
#view-login h2{font-family:var(--serif);font-size:20px;color:var(--indigo-deep);margin-bottom:8px}
#view-login p{font-size:14px;color:var(--ink-soft);margin-bottom:28px}
#login-btn{
  font-family:var(--sans);font-size:15px;font-weight:500;
  padding:13px 28px;border-radius:12px;cursor:pointer;
  border:none;background:var(--indigo-deep);color:#fff;
}
#login-hint{font-size:12px;color:var(--ink-soft);margin-top:18px;line-height:1.8}

/* ---- Tab bar ---- */
nav{
  position:fixed;left:0;right:0;bottom:0;
  background:rgba(252,253,252,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--mist);
  display:flex;justify-content:space-around;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:50;
}
nav button{flex:1;background:none;border:none;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink-soft);padding:8px 0 6px;cursor:pointer;border-radius:10px}
nav button .ic{display:block;font-size:19px;line-height:1.2;font-family:var(--serif)}
nav button.on{color:var(--indigo-deep)}
nav button.on .ic{color:var(--shu)}
nav button:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}

/* ---- 回顧卡片 ---- */
.review-head{display:flex;justify-content:space-between;align-items:center;margin:6px 2px 14px}
.review-head .date{font-size:13px;color:var(--ink-soft);letter-spacing:.06em}
.review-head .right{display:flex;gap:12px;align-items:center}
.review-head .count{font-size:13px;color:var(--indigo);font-weight:500}
.streakbtn{background:none;border:none;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--shu);cursor:pointer;padding:2px 4px}
.qcard{
  position:relative;background:var(--card);border:1px solid var(--mist);
  border-radius:var(--radius);padding:26px 24px 22px 34px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(27,50,71,.06);
}
.qcard .spine{position:absolute;left:0;top:0;bottom:0;width:14px;border-radius:var(--radius) 0 0 var(--radius);background:var(--indigo)}
.qcard .vtag{position:absolute;left:16px;top:24px;writing-mode:vertical-rl;font-size:11px;letter-spacing:.24em;color:var(--indigo);max-height:70%;overflow:hidden;white-space:nowrap}
.qcard blockquote{font-family:var(--serif);font-size:19px;line-height:1.9;color:var(--ink);margin-bottom:16px;white-space:pre-wrap}
.qcard .src{font-size:13px;color:var(--ink-soft)}
.qcard .src b{color:var(--indigo-deep)}
.qcard .note{margin-top:12px;padding:10px 12px;background:var(--paper);border-radius:8px;font-size:14px;color:var(--ink-soft);white-space:pre-wrap}
.qcard .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;letter-spacing:.05em;color:var(--indigo);border:1px solid var(--mist);border-radius:999px;padding:2px 10px}
.srclink{margin-top:8px}
.srclink a{font-size:12px;color:var(--indigo);text-decoration:none;border-bottom:1px solid var(--mist)}
.seal{
  position:absolute;right:18px;top:18px;width:40px;height:40px;
  border:2px solid var(--shu);border-radius:6px;color:var(--shu);
  font-family:var(--serif);font-weight:700;font-size:12px;line-height:1.15;
  display:flex;align-items:center;justify-content:center;text-align:center;
  transform:rotate(-4deg);opacity:.85;
}
.qactions{display:flex;gap:10px;margin-bottom:10px}
.qactions.sub{margin-bottom:22px}
.btn{
  flex:1;font-family:var(--sans);font-size:15px;font-weight:500;
  padding:12px 0;border-radius:12px;cursor:pointer;
  border:1px solid var(--mist);background:var(--card);color:var(--indigo-deep);
}
.btn.primary{background:var(--indigo-deep);border-color:var(--indigo-deep);color:#fff}
.btn.fav{flex:0 0 52px}
.btn.fav.on{color:var(--shu);border-color:var(--shu)}
.btn.sm{font-size:13px;padding:9px 0;color:var(--ink-soft)}
.btn:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
.done-banner{text-align:center;padding:56px 20px}
.done-banner .stamp{
  width:74px;height:74px;margin:0 auto 18px;
  border:3px solid var(--shu);border-radius:10px;color:var(--shu);
  font-family:var(--serif);font-weight:700;font-size:20px;
  display:flex;align-items:center;justify-content:center;transform:rotate(-5deg);
}
.done-banner p{color:var(--ink-soft);font-size:14px;margin-top:6px}

/* ---- streak 日曆 ---- */
#cal-overlay{position:fixed;inset:0;background:rgba(23,36,47,.45);z-index:70;display:flex;align-items:center;justify-content:center;padding:24px}
#cal-box{background:var(--card);border-radius:var(--radius);padding:20px;max-width:380px;width:100%;max-height:80vh;overflow:auto}
#cal-box h3{font-family:var(--serif);font-size:17px;color:var(--indigo-deep);margin-bottom:4px}
#cal-box .cal-sub{font-size:12px;color:var(--ink-soft);margin-bottom:12px}
.cal-month h4{font-family:var(--serif);font-size:14px;color:var(--indigo-deep);margin:12px 0 6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-grid span{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);border-radius:6px}
.cal-grid span.hit{background:var(--shu);color:#fff;font-weight:500}
.cal-grid span.future{opacity:.3}
#cal-close{width:100%;margin-top:16px}

/* ---- 書庫 ---- */
.searchbar{display:flex;gap:8px;margin-bottom:14px}
.searchbar input{flex:1;font-family:var(--sans);font-size:15px;padding:11px 14px;border-radius:12px;border:1px solid var(--mist);background:var(--card);color:var(--ink)}
.searchbar input:focus{outline:2px solid var(--indigo);outline-offset:1px}
.group-title{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--indigo-deep);margin:20px 2px 10px;display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.group-title small{font-family:var(--sans);font-weight:400;font-size:12px;color:var(--ink-soft);white-space:nowrap}
.lcard{background:var(--card);border:1px solid var(--mist);border-radius:12px;padding:16px 16px 12px;margin-bottom:10px}
.lcard.discarded{opacity:.55}
.lcard blockquote{font-family:var(--serif);font-size:15.5px;line-height:1.85;margin-bottom:8px;white-space:pre-wrap}
.lcard .lnote{margin:0 0 8px;padding:8px 10px;background:var(--paper);border-radius:8px;font-size:13px;color:var(--ink-soft);white-space:pre-wrap}
.lcard .meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;gap:6px}
.lcard .meta .ops{display:flex;gap:14px}
.lcard .meta button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--indigo);font-family:var(--sans);padding:4px 0}
.lcard .meta button.danger{color:var(--shu)}
.empty{text-align:center;padding:64px 24px;color:var(--ink-soft)}
.empty .glyph{font-family:var(--serif);font-size:40px;color:var(--mist);margin-bottom:12px}
.empty p{font-size:14px;line-height:1.8}

/* ---- 表單 ---- */
form label{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);margin:16px 2px 6px}
form input,form textarea{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);padding:12px 14px;border-radius:12px;border:1px solid var(--mist);background:var(--card)}
form textarea{resize:vertical;min-height:110px;font-family:var(--serif);line-height:1.8}
form input:focus,form textarea:focus{outline:2px solid var(--indigo);outline-offset:1px}
form .submit{width:100%;margin-top:22px;padding:14px 0}

/* ---- 匯出/設定 ---- */
.export-box{background:var(--card);border:1px solid var(--mist);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.export-box h3{font-family:var(--serif);font-size:16px;color:var(--indigo-deep);margin-bottom:6px}
.export-box p{font-size:13px;color:var(--ink-soft);margin-bottom:12px}
.export-box .setrow{display:flex;gap:10px;align-items:center}
.export-box .setrow input{width:90px;font-family:var(--sans);font-size:15px;padding:9px 12px;border-radius:10px;border:1px solid var(--mist);background:var(--paper);color:var(--ink)}
.export-box .setrow .btn{flex:0 0 auto;padding:9px 20px;font-size:14px}

.toast{
  position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(8px);
  background:var(--indigo-deep);color:#fff;font-size:13px;
  padding:9px 18px;border-radius:999px;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:60;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <h1>拾句<span>SHIJU · 書摘回顧</span></h1>
  <button id="userchip" class="hidden" title="點擊登出"></button>
</header>

<main>
  <!-- 登入 -->
  <section id="view-login">
    <div class="mark">拾</div>
    <h2>拾句 · 書摘回顧</h2>
    <p>用 Google 帳號登入,<br>iPhone 與 iPad 的書摘會自動同步。</p>
    <button id="login-btn">使用 Google 登入</button>
    <div id="login-hint"></div>
  </section>

  <!-- 今日回顧 -->
  <section id="view-review" class="hidden">
    <div class="review-head">
      <div class="date" id="today-date"></div>
      <div class="right">
        <button class="streakbtn" id="streak-chip" title="回顧日曆"></button>
        <div class="count" id="review-progress"></div>
      </div>
    </div>
    <div id="review-stage"></div>
  </section>

  <!-- 書庫 -->
  <section id="view-library" class="hidden">
    <div class="searchbar">
      <input id="search" type="search" placeholder="搜尋內容、出處、作者、標籤…" aria-label="搜尋書摘">
    </div>
    <div id="library-list"></div>
  </section>

  <!-- 新增 -->
  <section id="view-add" class="hidden">
    <form id="add-form" onsubmit="return false">
      <label for="f-quote">摘錄內容 *</label>
      <textarea id="f-quote" required placeholder="貼上或輸入你想留下的句子…"></textarea>
      <label for="f-source">出處(書名/文章)*</label>
      <input id="f-source" required placeholder="例:愛的藝術">
      <label for="f-author">作者</label>
      <input id="f-author" placeholder="例:Erich Fromm">
      <label for="f-note">我的筆記</label>
      <textarea id="f-note" style="min-height:70px;font-family:var(--sans)" placeholder="這句話為什麼重要?"></textarea>
      <label for="f-tags">標籤(逗號分隔)</label>
      <input id="f-tags" placeholder="例:設計, 哲學, IELTS">
      <button type="button" class="btn primary submit" id="save-btn">存入書庫</button>
    </form>
  </section>

  <!-- 匯出/設定 -->
  <section id="view-export" class="hidden">
    <div class="export-box">
      <h3>設定</h3>
      <p>每日回顧卡片數量(3–50,隔日生效)。</p>
      <div class="setrow">
        <input id="set-daily" type="number" min="3" max="50" inputmode="numeric">
        <button class="btn" id="save-settings">儲存</button>
      </div>
    </div>
    <div class="export-box">
      <h3>Markdown</h3>
      <p>依出處分組,可直接貼到 Notion 或 Obsidian。</p>
      <button class="btn" id="copy-md">複製 Markdown</button>
    </div>
    <div class="export-box">
      <h3>JSON 備份</h3>
      <p>完整資料備份(含書目與 SRS 狀態)。</p>
      <button class="btn" id="copy-json">複製 JSON</button>
    </div>
    <div class="export-box">
      <h3>統計</h3>
      <p id="stats">—</p>
    </div>
  </section>
</main>

<nav id="tabbar" class="hidden" aria-label="主選單">
  <button data-view="review" class="on"><span class="ic">今</span>今日回顧</button>
  <button data-view="library"><span class="ic">庫</span>書庫</button>
  <button data-view="add"><span class="ic">拾</span>新增</button>
  <button data-view="export"><span class="ic">出</span>匯出</button>
</nav>

<div id="cal-overlay" class="hidden">
  <div id="cal-box">
    <h3>回顧日曆</h3>
    <div class="cal-sub" id="cal-streak"></div>
    <div id="cal-body"></div>
    <button class="btn" id="cal-close">關閉</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCUgEu1PzpDRppnFqvytiq7A1Jk4auFNjY",
  authDomain: "shiju-e9049.firebaseapp.com",
  projectId: "shiju-e9049",
  storageBucket: "shiju-e9049.firebasestorage.app",
  messagingSenderId: "254001497356",
  appId: "1:254001497356:web:ecedb3b8305cf8e58e7529",
  measurementId: "G-5P10SM2ERX"
};

/* ================================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect,
  getRedirectResult, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot,
  serverTimestamp, writeBatch, arrayUnion, increment, deleteField, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
let db;
try {
  db = initializeFirestore(app, {
    localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
  });
} catch (e) {
  const { getFirestore } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  db = getFirestore(app);
}

/* ---------- SRS 參數 (§4) ---------- */
const SRS = {
  initialHalfLife: 1,     // 新劃線半衰期(天)→ 隔天就進入回顧候選
  growthFactor: 2,        // 每次成功回想,半衰期加倍
  minHalfLife: 0.25,
  maxHalfLife: 1825,      // 5 年封頂
  minFreq: 0.25, maxFreq: 4,
  defaultDaily: 15,
  poolFloor: 0.0001       // 權重下限,避免剛看過的卡權重歸零導致抽樣崩潰
};

/* ---------- 狀態 ---------- */
let USER = null;
let BOOKS = {};              // bookId → book
let HL = [];                 // highlights(onSnapshot 即時更新)
let HL_LOADED = false;
let META = {};               // meta/state:settings + streak
let SESSION = null;          // 當日 reviewSessions/{date}
let SESSION_LOADED = false;
let SESSION_DATE = null;
let unsubHL = null, unsubBooks = null, unsubMeta = null, unsubSession = null;
let editingId = null;
let currentView = 'review';
let capturedUrl = '';
let creatingSession = false;
let migrationRan = false;
let metaMigrating = false;

/* ---------- 分享擷取(iOS 捷徑用) ---------- */
const _params = new URLSearchParams(location.search);
let pendingCapture = null;
if (_params.get('quote')) {
  pendingCapture = {
    quote: _params.get('quote') || '',
    source: _params.get('source') || _params.get('title') || '',
    url: _params.get('url') || ''
  };
  history.replaceState(null, '', location.pathname);
}
function applyPendingCapture() {
  if (!pendingCapture) return;
  editingId = null;
  $('#f-quote').value = pendingCapture.quote;
  $('#f-source').value = pendingCapture.source;
  capturedUrl = pendingCapture.url;
  pendingCapture = null;
  $('#save-btn').textContent = '存入書庫';
  switchView('add');
  toast('已帶入摘錄,確認出處後存檔');
}

/* ---------- 小工具 ---------- */
const $ = s => document.querySelector(s);
const dateKey = d => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
const todayStr = () => dateKey(new Date());
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const esc = s => (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const hlRef = id => doc(db, 'users', USER.uid, 'highlights', id);
const bookRef = id => doc(db, 'users', USER.uid, 'books', id);
const sessRef = () => doc(db, 'users', USER.uid, 'reviewSessions', SESSION_DATE);
const hlById = id => HL.find(h => h.id === id);
const settings = () => ({ dailyCount: clamp(META.settings?.dailyCount || SRS.defaultDaily, 3, 50) });
function toast(msg) { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 1800); }

/* ---------- 登入/登出 ---------- */
const provider = new GoogleAuthProvider();
$('#login-btn').onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    // iOS 全螢幕模式(加入主畫面)偶爾擋 popup → 改走 redirect
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
      try { await signInWithRedirect(auth, provider); }
      catch (e2) { $('#login-hint').textContent = '登入失敗:' + e2.message; }
    } else if (e.code === 'auth/unauthorized-domain') {
      $('#login-hint').textContent = '這個網域尚未授權。請到 Firebase Console → Authentication → Settings → Authorized domains,加入目前的網址網域。';
    } else {
      $('#login-hint').textContent = '登入失敗:' + e.message;
    }
  }
};
getRedirectResult(auth).catch(() => {});
$('#userchip').onclick = async () => {
  if (confirm('登出?')) { await signOut(auth); }
};

onAuthStateChanged(auth, user => {
  USER = user;
  if (user) {
    $('#view-login').classList.add('hidden');
    $('#tabbar').classList.remove('hidden');
    $('#userchip').classList.remove('hidden');
    $('#userchip').textContent = user.displayName || user.email;
    subscribe();
    switchView('review');
    applyPendingCapture();
  } else {
    [unsubHL, unsubBooks, unsubMeta, unsubSession].forEach(u => u && u());
    unsubHL = unsubBooks = unsubMeta = unsubSession = null;
    BOOKS = {}; HL = []; META = {}; SESSION = null;
    HL_LOADED = SESSION_LOADED = false; migrationRan = false;
    $('#tabbar').classList.add('hidden');
    $('#userchip').classList.add('hidden');
    ['review', 'library', 'add', 'export'].forEach(v => $('#view-' + v).classList.add('hidden'));
    $('#view-login').classList.remove('hidden');
  }
});

/* ---------- Firestore 即時訂閱 ---------- */
function subscribe() {
  unsubBooks = onSnapshot(collection(db, 'users', USER.uid, 'books'), snap => {
    BOOKS = {};
    snap.docs.forEach(d => BOOKS[d.id] = { id: d.id, ...d.data() });
    rerender();
  }, err => toast('讀取失敗:' + err.code));
  unsubHL = onSnapshot(collection(db, 'users', USER.uid, 'highlights'), snap => {
    HL = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    HL.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0) || (a.id < b.id ? -1 : 1));
    HL_LOADED = true;
    migrateIfNeeded();
    rerender();
  }, err => toast('讀取失敗:' + err.code));
  unsubMeta = onSnapshot(doc(db, 'users', USER.uid, 'meta', 'state'), snap => {
    META = snap.exists() ? snap.data() : {};
    migrateMetaIfNeeded();
    rerender();
  });
  subscribeSession();
}
function subscribeSession() {
  if (unsubSession) unsubSession();
  SESSION_DATE = todayStr();
  SESSION = null; SESSION_LOADED = false;
  unsubSession = onSnapshot(sessRef(), snap => {
    SESSION = snap.exists() ? snap.data() : null;
    SESSION_LOADED = true;
    rerender();
  });
}
function rerender() {
  if (currentView === 'review') renderReview();
  if (currentView === 'library') renderLibrary();
  if (currentView === 'export') renderExport();
}

async function saveMeta() {
  // streak 歷史只保留最近 365 天
  const hist = META.streak?.history || {};
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 365);
  const co = dateKey(cutoff);
  for (const k of Object.keys(hist)) if (k < co) delete hist[k];
  await setDoc(doc(db, 'users', USER.uid, 'meta', 'state'), META);
}

/* ---------- 舊資料遷移:單層 highlights → books + highlights ---------- */
async function migrateIfNeeded() {
  if (migrationRan) return;
  const old = HL.filter(h => h.quote !== undefined && h.text === undefined);
  if (!old.length) return;
  migrationRan = true;
  toast('偵測到舊資料,升級中…');
  try {
    const groups = new Map();
    for (const h of old) {
      const k = (h.source || '未命名') + '\u0000' + (h.author || '');
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(h);
    }
    const ops = [];
    const bookIdByKey = new Map();
    for (const [k, list] of groups) {
      const [title, author] = k.split('\u0000');
      const ex = Object.values(BOOKS).find(b => b.title === title && (b.author || '') === author);
      const bid = ex ? ex.id : uid();
      bookIdByKey.set(k, bid);
      if (ex) {
        ops.push({ type: 'update', ref: bookRef(bid), data: { highlightCount: increment(list.length) } });
      } else {
        ops.push({ type: 'set', ref: bookRef(bid), data: {
          title, author, category: list.some(h => h.url) ? 'article' : 'book',
          coverUrl: null, sourceUrl: null, frequency: 1,
          highlightCount: list.length, createdAt: serverTimestamp()
        }});
      }
    }
    for (const h of old) {
      const k = (h.source || '未命名') + '\u0000' + (h.author || '');
      const rc = h.reviews || 0;
      let lastR = null;
      if (h.lastReviewed) {
        const d = new Date(h.lastReviewed + 'T12:00:00');
        if (!isNaN(d)) lastR = Timestamp.fromDate(d);
      }
      ops.push({ type: 'update', ref: hlRef(h.id), data: {
        text: h.quote, note: h.note || '', bookId: bookIdByKey.get(k),
        tags: h.tags || [], location: null, url: h.url || null,
        favorited: !!h.fav, discarded: false,
        srs: {
          halfLife: clamp(SRS.initialHalfLife * Math.pow(SRS.growthFactor, rc), SRS.minHalfLife, SRS.maxHalfLife),
          lastReviewed: lastR, reviewCount: rc
        },
        quote: deleteField(), source: deleteField(), author: deleteField(),
        reviews: deleteField(), fav: deleteField(), lastReviewed: deleteField(), created: deleteField()
      }});
    }
    for (let i = 0; i < ops.length; i += 400) {
      const b = writeBatch(db);
      ops.slice(i, i + 400).forEach(o => o.type === 'set' ? b.set(o.ref, o.data) : b.update(o.ref, o.data));
      await b.commit();
    }
    toast('資料升級完成:' + old.length + ' 則劃線、' + groups.size + ' 個出處');
  } catch (e) {
    migrationRan = false;
    toast('資料升級失敗:' + (e.code || e.message));
  }
}
async function migrateMetaIfNeeded() {
  if (metaMigrating || !META.reviewLog) return;
  metaMigrating = true;
  const history = META.streak?.history || {};
  for (const [k, v] of Object.entries(META.reviewLog)) {
    if (v && v.done && v.done.length > 0) history[k] = true;
  }
  META.streak = { history };
  delete META.reviewLog;
  try { await saveMeta(); } catch (e) {}
  metaMigrating = false;
}

/* ---------- 間隔重複演算法 (§4) ---------- */
// 回想機率 p(t) = 2^(-elapsedDays / halfLife)
function recallP(h, now) {
  const ref = h.srs?.lastReviewed?.seconds ? h.srs.lastReviewed.seconds * 1000
            : (h.createdAt?.seconds ? h.createdAt.seconds * 1000 : now);
  const days = Math.max(0, (now - ref) / 86400000);
  return Math.pow(2, -days / (h.srs?.halfLife || SRS.initialHalfLife));
}
function seededRand(seed) { return () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }; }
// 加權隨機抽 N 張:權重 = (1 - p) × book.frequency;每日固定亂數種子 → 多裝置同一組卡
function pickDaily(cand) {
  const now = Date.now();
  const N = Math.min(settings().dailyCount, cand.length);
  const rnd = seededRand(parseInt(SESSION_DATE.replace(/-/g, ''), 10));
  const pool = [...cand].sort((a, b) => (a.id < b.id ? -1 : 1)).map(h => ({
    id: h.id,
    w: Math.max(SRS.poolFloor, (1 - recallP(h, now)) * (BOOKS[h.bookId]?.frequency ?? 1))
  }));
  const out = [];
  while (out.length < N && pool.length) {
    const total = pool.reduce((s, x) => s + x.w, 0);
    let r = rnd() * total, i = 0;
    for (; i < pool.length - 1; i++) { r -= pool[i].w; if (r <= 0) break; }
    out.push(pool[i].id);
    pool.splice(i, 1);
  }
  return out;
}

/* ---------- 今日回顧 ---------- */
const activeHL = () => HL.filter(h => !h.discarded && h.text !== undefined);

async function ensureSession() {
  if (!SESSION_LOADED || creatingSession) return;
  if (SESSION && (SESSION.cards || []).length) return;
  const cand = activeHL();
  if (!cand.length) return;
  creatingSession = true;
  try {
    await setDoc(sessRef(), {
      date: SESSION_DATE,
      cards: pickDaily(cand),
      done: SESSION?.done || [],
      createdAt: serverTimestamp()
    });
  } catch (e) { toast('建立今日回顧失敗:' + (e.code || e.message)); }
  creatingSession = false;
}

function sessionComplete(doneSet) {
  return SESSION.cards.every(id => {
    const h = hlById(id);
    return doneSet.has(id) || !h || h.discarded;
  });
}
async function markDone(id) {
  const doneSet = new Set([...(SESSION.done || []), id]);
  await updateDoc(sessRef(), { done: arrayUnion(id) });
  if (sessionComplete(doneSet)) await recordCompletion();
}
async function recordCompletion() {
  const t = todayStr();
  if (META.streak?.history?.[t]) return;
  if (!META.streak) META.streak = { history: {} };
  if (!META.streak.history) META.streak.history = {};
  META.streak.history[t] = true;
  try { await saveMeta(); } catch (e) {}
}
function calcStreak() {
  const hist = META.streak?.history || {};
  let n = 0;
  const d = new Date();
  if (!hist[dateKey(d)]) d.setDate(d.getDate() - 1); // 今天還沒完成 → 從昨天起算
  while (hist[dateKey(d)]) { n++; d.setDate(d.getDate() - 1); }
  return n;
}

function renderReview() {
  if (SESSION_DATE !== todayStr()) { subscribeSession(); return; } // 跨日重新訂閱
  const d = new Date();
  $('#today-date').textContent = d.getFullYear() + ' 年 ' + (d.getMonth() + 1) + ' 月 ' + d.getDate() + ' 日 · 週' + '日一二三四五六'[d.getDay()];
  $('#streak-chip').textContent = '🔥 ' + calcStreak();
  const stage = $('#review-stage');
  if (!HL_LOADED || !SESSION_LOADED) {
    $('#review-progress').textContent = '';
    stage.innerHTML = '<div class="empty"><p>載入中…</p></div>';
    return;
  }
  const cand = activeHL();
  if (!cand.length && !(SESSION?.cards || []).length) {
    $('#review-progress').textContent = '';
    stage.innerHTML = '<div class="empty"><div class="glyph">拾</div><p>書庫還是空的。<br>到「新增」放進第一句你想反覆重讀的話。</p></div>';
    return;
  }
  if (!SESSION || !(SESSION.cards || []).length) {
    ensureSession();
    stage.innerHTML = '<div class="empty"><p>準備今日卡片…</p></div>';
    return;
  }
  const doneSet = new Set(SESSION.done || []);
  const remaining = SESSION.cards.filter(id => {
    const h = hlById(id);
    return !doneSet.has(id) && h && !h.discarded;
  });
  const doneCount = SESSION.cards.length - remaining.length;
  $('#review-progress').textContent = '今日 ' + doneCount + ' / ' + SESSION.cards.length;
  if (!remaining.length) {
    recordCompletion();
    stage.innerHTML = '<div class="done-banner"><div class="stamp">回顧<br>畢</div><div style="font-family:var(--serif);font-size:18px;font-weight:700;color:var(--indigo-deep)">今日回顧完成</div><p>連續回顧 ' + calcStreak() + ' 天。明天會有新的一組句子。</p></div>';
    return;
  }
  const h = hlById(remaining[0]);
  const book = BOOKS[h.bookId] || { title: '未分類', author: '', frequency: 1 };
  const freq = book.frequency ?? 1;
  stage.innerHTML = `
    <article class="qcard">
      <div class="spine"></div>
      <div class="vtag">${esc(book.title)}</div>
      <div class="seal">${(h.srs?.reviewCount || 0)}<br>回</div>
      <blockquote>${esc(h.text)}</blockquote>
      <div class="src"><b>${esc(book.title)}</b>${book.author ? ' · ' + esc(book.author) : ''}</div>
      ${h.url ? '<div class="srclink"><a href="' + esc(h.url) + '" target="_blank" rel="noopener">原文連結 →</a></div>' : ''}
      ${h.note ? '<div class="note">' + esc(h.note) + '</div>' : ''}
      ${h.tags && h.tags.length ? '<div class="tags">' + h.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') + '</div>' : ''}
    </article>
    <div class="qactions">
      <button class="btn fav ${h.favorited ? 'on' : ''}" id="fav-btn" aria-label="收藏">${h.favorited ? '♥' : '♡'}</button>
      <button class="btn primary" id="next-btn">已讀,下一句</button>
    </div>
    <div class="qactions sub">
      <button class="btn sm" id="edit-btn">編輯</button>
      <button class="btn sm" id="discard-btn">移出輪替</button>
      <button class="btn sm" id="tune-down" title="降低此出處出現頻率">頻率 ↓</button>
      <button class="btn sm" id="tune-up" title="提高此出處出現頻率">頻率 ↑ ×${freq}</button>
    </div>`;
  $('#next-btn').onclick = async () => {
    try {
      // 成功回想 → 半衰期加倍 (§4.3)
      const half = clamp((h.srs?.halfLife || SRS.initialHalfLife) * SRS.growthFactor, SRS.minHalfLife, SRS.maxHalfLife);
      await updateDoc(hlRef(h.id), {
        'srs.halfLife': half,
        'srs.lastReviewed': serverTimestamp(),
        'srs.reviewCount': increment(1)
      });
      await markDone(h.id);
    } catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#fav-btn').onclick = async () => {
    try { await updateDoc(hlRef(h.id), { favorited: !h.favorited }); }
    catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#discard-btn').onclick = async () => {
    if (!confirm('移出回顧輪替?(仍會保留在書庫,可隨時恢復)')) return;
    try {
      await updateDoc(hlRef(h.id), { discarded: true });
      await markDone(h.id);
      toast('已移出輪替');
    } catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#edit-btn').onclick = () => openEditor(h);
  const tune = async dir => {
    if (!BOOKS[h.bookId]) { toast('找不到此出處'); return; }
    const nf = clamp(freq * (dir > 0 ? 2 : 0.5), SRS.minFreq, SRS.maxFreq);
    try {
      await updateDoc(bookRef(h.bookId), { frequency: nf });
      toast('「' + book.title + '」出現頻率 ×' + nf);
    } catch (e) { toast('儲存失敗,請重試'); }
  };
  $('#tune-up').onclick = () => tune(1);
  $('#tune-down').onclick = () => tune(-1);
}

/* ---------- streak 日曆 ---------- */
function showCalendar() {
  const hist = META.streak?.history || {};
  $('#cal-streak').textContent = '連續 ' + calcStreak() + ' 天 · 近 365 天完成 ' + Object.keys(hist).length + ' 天';
  const now = new Date();
  let html = '';
  for (let m = 2; m >= 0; m--) {
    const first = new Date(now.getFullYear(), now.getMonth() - m, 1);
    const days = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
    html += '<div class="cal-month"><h4>' + first.getFullYear() + ' 年 ' + (first.getMonth() + 1) + ' 月</h4><div class="cal-grid">';
    for (let i = 0; i < first.getDay(); i++) html += '<span></span>';
    for (let day = 1; day <= days; day++) {
      const key = dateKey(new Date(first.getFullYear(), first.getMonth(), day));
      html += '<span class="' + (hist[key] ? 'hit' : '') + (key > todayStr() ? ' future' : '') + '">' + day + '</span>';
    }
    html += '</div></div>';
  }
  $('#cal-body').innerHTML = html;
  $('#cal-overlay').classList.remove('hidden');
}
$('#streak-chip').onclick = showCalendar;
$('#cal-close').onclick = () => $('#cal-overlay').classList.add('hidden');
$('#cal-overlay').onclick = e => { if (e.target.id === 'cal-overlay') $('#cal-overlay').classList.add('hidden'); };

/* ---------- 書庫 ---------- */
function renderLibrary() {
  const q = ($('#search').value || '').trim().toLowerCase();
  const list = $('#library-list');
  let items = HL.filter(h => h.text !== undefined);
  if (q) items = items.filter(h => {
    const b = BOOKS[h.bookId];
    return (h.text || '').toLowerCase().includes(q) ||
      (b?.title || '').toLowerCase().includes(q) ||
      (b?.author || '').toLowerCase().includes(q) ||
      (h.note || '').toLowerCase().includes(q) ||
      (h.tags || []).some(t => t.toLowerCase().includes(q));
  });
  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><div class="glyph">庫</div><p>' + (q ? '找不到符合的書摘。' : '書庫還是空的,從「新增」開始。') + '</p></div>';
    return;
  }
  const groups = {};
  items.forEach(h => { (groups[h.bookId] = groups[h.bookId] || []).push(h); });
  const bids = Object.keys(groups).sort((a, b) => (BOOKS[a]?.title || '').localeCompare(BOOKS[b]?.title || '', 'zh-Hant'));
  list.innerHTML = bids.map(bid => {
    const b = BOOKS[bid] || { title: '未分類', author: '' };
    const g = groups[bid];
    const freq = b.frequency ?? 1;
    return '<div class="group-title">' + esc(b.title) + (b.author ? ' <small>' + esc(b.author) + '</small>' : '') +
      '<small>' + g.length + ' 則' + (freq !== 1 ? ' · 頻率×' + freq : '') + '</small></div>' +
      g.map(h => `
      <div class="lcard${h.discarded ? ' discarded' : ''}">
        <blockquote>${esc(h.text)}</blockquote>
        ${h.url ? '<div class="srclink"><a href="' + esc(h.url) + '" target="_blank" rel="noopener">原文連結 →</a></div>' : ''}
        ${h.note ? '<div class="lnote">' + esc(h.note) + '</div>' : ''}
        <div class="meta">
          <span>${h.favorited ? '♥ ' : ''}回顧 ${(h.srs?.reviewCount || 0)} 次${h.discarded ? ' · 已移出輪替' : ''}${h.tags && h.tags.length ? ' · ' + h.tags.map(esc).join('、') : ''}</span>
          <span class="ops">
            <button data-fav="${h.id}">${h.favorited ? '取消收藏' : '收藏'}</button>
            <button data-disc="${h.id}">${h.discarded ? '恢復輪替' : '移出'}</button>
            <button data-edit="${h.id}">編輯</button>
            <button data-del="${h.id}" class="danger">刪除</button>
          </span>
        </div>
      </div>`).join('');
  }).join('');
  list.querySelectorAll('[data-fav]').forEach(b => b.onclick = async () => {
    const h = hlById(b.dataset.fav); if (!h) return;
    try { await updateDoc(hlRef(h.id), { favorited: !h.favorited }); }
    catch (e) { toast('儲存失敗,請重試'); }
  });
  list.querySelectorAll('[data-disc]').forEach(b => b.onclick = async () => {
    const h = hlById(b.dataset.disc); if (!h) return;
    try {
      await updateDoc(hlRef(h.id), { discarded: !h.discarded });
      toast(h.discarded ? '已恢復輪替' : '已移出輪替');
    } catch (e) { toast('儲存失敗,請重試'); }
  });
  list.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (confirm('確定刪除這則書摘?')) {
      const h = hlById(b.dataset.del);
      try {
        await deleteDoc(hlRef(b.dataset.del));
        if (h && BOOKS[h.bookId]) await updateDoc(bookRef(h.bookId), { highlightCount: increment(-1) });
        toast('已刪除');
      } catch (e) { toast('刪除失敗,請重試'); }
    }
  });
  list.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => {
    const h = hlById(b.dataset.edit);
    if (h) openEditor(h);
  });
}

/* ---------- 新增/編輯 ---------- */
function openEditor(h) {
  const book = BOOKS[h.bookId];
  editingId = h.id;
  $('#f-quote').value = h.text || '';
  $('#f-source').value = book?.title || '';
  $('#f-author').value = book?.author || '';
  $('#f-note').value = h.note || '';
  $('#f-tags').value = (h.tags || []).join(', ');
  $('#save-btn').textContent = '更新書摘';
  switchView('add');
}
async function findOrCreateBook(title, author, sourceUrl) {
  const ex = Object.values(BOOKS).find(b => b.title === title && (b.author || '') === (author || ''));
  if (ex) return ex.id;
  const id = uid();
  const data = {
    title, author: author || '', category: sourceUrl ? 'article' : 'book',
    coverUrl: null, sourceUrl: sourceUrl || null, frequency: 1,
    highlightCount: 0, createdAt: serverTimestamp()
  };
  await setDoc(bookRef(id), data);
  BOOKS[id] = { id, ...data }; // 先寫入本地,避免 snapshot 尚未回來前重複建立
  return id;
}
$('#save-btn').onclick = async () => {
  const text = $('#f-quote').value.trim(), title = $('#f-source').value.trim();
  if (!text || !title) { toast('請填寫摘錄內容與出處'); return; }
  const author = $('#f-author').value.trim();
  const tags = $('#f-tags').value.split(/[,,、]/).map(s => s.trim()).filter(Boolean);
  const note = $('#f-note').value.trim();
  try {
    if (editingId) {
      const h = hlById(editingId);
      const oldBook = h ? BOOKS[h.bookId] : null;
      let bookId = h?.bookId;
      if (!oldBook || oldBook.title !== title || (oldBook.author || '') !== author) {
        bookId = await findOrCreateBook(title, author, h?.url);
        if (oldBook) await updateDoc(bookRef(oldBook.id), { highlightCount: increment(-1) });
        await updateDoc(bookRef(bookId), { highlightCount: increment(1) });
      }
      await updateDoc(hlRef(editingId), { text, note, tags, bookId });
      toast('已更新');
    } else {
      const bookId = await findOrCreateBook(title, author, capturedUrl);
      await setDoc(hlRef(uid()), {
        text, note, tags, bookId, location: null,
        url: capturedUrl || null, favorited: false, discarded: false,
        createdAt: serverTimestamp(),
        srs: { halfLife: SRS.initialHalfLife, lastReviewed: null, reviewCount: 0 }
      });
      await updateDoc(bookRef(bookId), { highlightCount: increment(1) });
      toast('已存入書庫');
    }
    capturedUrl = '';
    editingId = null;
    $('#add-form').querySelectorAll('input,textarea').forEach(el => el.value = '');
    $('#save-btn').textContent = '存入書庫';
    switchView('library');
  } catch (e) { toast('儲存失敗:' + (e.code || e.message)); }
};

/* ---------- 匯出/設定 ---------- */
function toMarkdown() {
  const groups = {};
  HL.filter(h => h.text !== undefined).forEach(h => { (groups[h.bookId] = groups[h.bookId] || []).push(h); });
  const bids = Object.keys(groups).sort((a, b) => (BOOKS[a]?.title || '').localeCompare(BOOKS[b]?.title || '', 'zh-Hant'));
  return bids.map(bid => {
    const b = BOOKS[bid] || { title: '未分類', author: '' };
    let md = '## ' + b.title + (b.author ? ' — ' + b.author : '') + '\n\n';
    groups[bid].forEach(h => {
      md += '> ' + h.text.replace(/\n/g, '\n> ') + '\n\n';
      if (h.note) md += '筆記:' + h.note + '\n\n';
      if (h.tags && h.tags.length) md += '標籤:' + h.tags.map(t => '#' + t).join(' ') + '\n\n';
    });
    return md;
  }).join('---\n\n') || '(尚無書摘)';
}
async function copyText(txt, msg) {
  try { await navigator.clipboard.writeText(txt); toast(msg); }
  catch (e) {
    const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove(); toast(msg);
  }
}
$('#copy-md').onclick = () => copyText(toMarkdown(), 'Markdown 已複製');
$('#copy-json').onclick = () => copyText(JSON.stringify({ books: Object.values(BOOKS), highlights: HL, meta: META }, null, 2), 'JSON 已複製');
$('#save-settings').onclick = async () => {
  const v = clamp(parseInt($('#set-daily').value, 10) || SRS.defaultDaily, 3, 50);
  $('#set-daily').value = v;
  if (!META.settings) META.settings = {};
  META.settings.dailyCount = v;
  try { await saveMeta(); toast('已儲存,明日回顧生效'); }
  catch (e) { toast('儲存失敗,請重試'); }
};
function renderExport() {
  const items = HL.filter(h => h.text !== undefined);
  const rv = items.reduce((s, h) => s + (h.srs?.reviewCount || 0), 0);
  $('#stats').textContent = items.length + ' 則書摘 · ' + Object.keys(BOOKS).length + ' 個出處 · 累計回顧 ' + rv + ' 次 · 連續 ' + calcStreak() + ' 天';
  const inp = $('#set-daily');
  if (document.activeElement !== inp) inp.value = settings().dailyCount;
}

/* ---------- 分頁切換 ---------- */
function switchView(v) {
  currentView = v;
  ['review', 'library', 'add', 'export'].forEach(x => {
    $('#view-' + x).classList.toggle('hidden', x !== v);
    document.querySelector('nav [data-view="' + x + '"]').classList.toggle('on', x === v);
  });
  rerender();
  window.scrollTo(0, 0);
}
document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  if (b.dataset.view === 'add') { editingId = null; capturedUrl = ''; $('#save-btn').textContent = '存入書庫'; }
  switchView(b.dataset.view);
});
$('#search').addEventListener('input', renderLibrary);
</script>
</body>
</html>
